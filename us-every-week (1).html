<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Us, Every Week</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --navy:#000000;
    --plum:#3E2244;
    --gold:#E8C468;
    --blush:#E7A6A8;
    --paper:#F7EFE3;
    --paper-dim:#EFE4D2;
    --ink:#241726;
    --line: rgba(247,239,227,0.16);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(232,196,104,0.10), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 0%, rgba(231,166,168,0.10), transparent 55%),
      var(--navy);
    color:var(--paper);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
    padding-bottom:80px;
  }
  .display{ font-family:'Fraunces', serif; }
  a{color:inherit;}

  /* ---------- HERO ---------- */
  .hero{
    max-width:920px;
    margin:0 auto;
    padding:64px 24px 20px;
    text-align:center;
  }
  .eyebrow{
    text-transform:uppercase;
    letter-spacing:0.18em;
    font-size:12px;
    color:var(--gold);
    margin-bottom:14px;
    font-weight:600;
  }
  .hero h1{
    font-size:clamp(34px, 6vw, 56px);
    font-weight:500;
    font-style:italic;
    margin:0 0 10px;
    line-height:1.08;
  }
  .hero p.sub{
    color:rgba(247,239,227,0.65);
    font-size:16px;
    max-width:460px;
    margin:0 auto;
  }

  /* moon signature element */
  .moon-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    margin:38px 0 8px;
  }
  .moon{
    width:150px;height:150px;
    border-radius:50%;
    position:relative;
    background: radial-gradient(circle at 35% 32%, #4a3050 0%, #241a2c 62%, #1a1420 100%);
    box-shadow: 0 0 60px rgba(232,196,104,0.10), inset 0 0 30px rgba(0,0,0,0.4);
    overflow:hidden;
  }
  .moon-fill{
    position:absolute; left:0; right:0; bottom:0;
    background: linear-gradient(180deg, #F3DFA0 0%, var(--gold) 55%, #d9a83c 100%);
    transition: height 1.1s cubic-bezier(.65,0,.35,1);
    height:0%;
  }
  .moon-fill::after{
    content:'';
    position:absolute; inset:0;
    background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.35), transparent 55%);
  }
  .moon-label{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-size:15px;
    color:var(--paper);
  }
  .moon-count{ color:var(--gold); font-weight:600; font-style:normal;}
  .reset-note{
    font-size:12.5px;
    color:rgba(247,239,227,0.45);
    letter-spacing:0.02em;
  }

  /* ---------- SECTION SHELL ---------- */
  .section{
    max-width:760px;
    margin:0 auto;
    padding:36px 24px 0;
  }
  .section-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:18px;
    border-bottom:1px solid var(--line);
    padding-bottom:12px;
  }
  .section-head h2{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-style:italic;
    font-size:22px;
    margin:0;
  }
  .section-head .streak{
    font-size:12.5px;
    color:var(--gold);
    letter-spacing:0.03em;
  }

  /* ---------- HABITS ---------- */
  .habit-list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .habit{
    display:flex;
    align-items:center;
    gap:16px;
    padding:16px 18px;
    background:rgba(247,239,227,0.035);
    border:1px solid var(--line);
    border-radius:14px;
    cursor:pointer;
    transition:background .25s ease, border-color .25s ease, transform .15s ease;
  }
  .habit:hover{ background:rgba(247,239,227,0.07); }
  .habit:active{ transform:scale(0.995); }
  .habit.done{
    background:rgba(232,196,104,0.09);
    border-color:rgba(232,196,104,0.35);
  }
  .check{
    width:26px;height:26px;
    border-radius:50%;
    border:1.5px solid rgba(247,239,227,0.35);
    flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    transition:all .2s ease;
  }
  .habit.done .check{
    background:var(--gold);
    border-color:var(--gold);
  }
  .check svg{ width:14px;height:14px; opacity:0; transition:opacity .15s ease; }
  .habit.done .check svg{ opacity:1; }
  .habit-icon{ font-size:20px; width:26px; text-align:center; flex:0 0 auto; }
  .habit-text{ flex:1; }
  .habit-name{ font-size:15.5px; font-weight:500; }
  .habit-desc{ font-size:12.5px; color:rgba(247,239,227,0.5); margin-top:2px; }
  .habit.done .habit-name{ color:var(--gold); }

  /* ---------- MEMORIES ---------- */
  .add-photo-btn{
    font-family:'Work Sans', sans-serif;
    font-size:13px;
    font-weight:600;
    background:transparent;
    color:var(--gold);
    border:1px solid rgba(232,196,104,0.4);
    border-radius:999px;
    padding:8px 16px;
    cursor:pointer;
    transition:background .2s ease;
  }
  .add-photo-btn:hover{ background:rgba(232,196,104,0.1); }
  #photoInput{ display:none; }

  .gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(150px,1fr));
    gap:16px;
    margin-top:20px;
  }
  .polaroid{
    background:var(--paper);
    padding:10px 10px 14px;
    border-radius:4px;
    box-shadow:0 10px 24px rgba(0,0,0,0.35);
    transform:rotate(var(--tilt));
    transition:transform .25s ease;
    position:relative;
  }
  .polaroid:hover{ transform:rotate(0deg) scale(1.03); z-index:5; }
  .polaroid img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    display:block;
    border-radius:2px;
  }
  .polaroid figcaption{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-size:12.5px;
    color:var(--ink);
    text-align:center;
    margin-top:8px;
    min-height:14px;
    word-break:break-word;
  }
  .polaroid .del{
    position:absolute; top:-8px; right:-8px;
    width:24px;height:24px;
    border-radius:50%;
    background:var(--plum);
    color:var(--paper);
    border:2px solid var(--navy);
    font-size:13px;
    line-height:1;
    cursor:pointer;
    opacity:0;
    transition:opacity .2s ease;
    display:flex;align-items:center;justify-content:center;
  }
  .polaroid:hover .del{ opacity:1; }

  .empty-state{
    text-align:center;
    padding:34px 20px;
    color:rgba(247,239,227,0.4);
    font-size:13.5px;
    border:1px dashed var(--line);
    border-radius:14px;
    margin-top:20px;
  }

  footer{
    text-align:center;
    margin-top:60px;
    font-size:12px;
    color:rgba(247,239,227,0.3);
    padding:0 24px;
  }

  .toast{
    position:fixed;
    bottom:24px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--gold);
    color:var(--ink);
    font-size:13px;
    font-weight:600;
    padding:10px 20px;
    border-radius:999px;
    opacity:0;
    pointer-events:none;
    transition:all .3s ease;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion:reduce){
    *{ transition:none !important; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="eyebrow">A ritual, not a rule</div>
  <h1 class="display">Us, every week</h1>
  <p class="sub">Six small ways we choose each other — checked off together, starting over every Monday.</p>

  <div class="moon-wrap">
    <div class="moon"><div class="moon-fill" id="moonFill"></div></div>
    <div class="moon-label" id="moonLabel">Loading&hellip;</div>
    <div class="reset-note" id="resetNote"></div>
  </div>
</div>

<div class="section">
  <div class="section-head">
    <h2 class="display">This week</h2>
    <div class="streak" id="streakLabel"></div>
  </div>
  <div class="habit-list" id="habitList"></div>
</div>

<div class="section">
  <div class="section-head">
    <h2 class="display">Memories</h2>
    <button class="add-photo-btn" id="addPhotoBtn">+ Add photo</button>
    <input type="file" id="photoInput" accept="image/*">
  </div>
  <div id="galleryWrap"></div>
</div>

<footer>Kept just between the two of you, on this page.</footer>
<div class="toast" id="toast"></div>

<script>
(function(){
  // ============================================================
  // SUPABASE CONFIG — fill these in with your project's values
  // (Project Settings -> API in your Supabase dashboard)
  // ============================================================
  const SUPABASE_URL = 'YOUR_SUPABASE_PROJECT_URL';
  const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
  // ============================================================

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const configured = !SUPABASE_URL.includes('YOUR_') && !SUPABASE_ANON_KEY.includes('YOUR_');

  const HABITS = [
    { id:'date',    icon:'🌹', name:'Go on a date',        desc:'Dress up a little. Leave the apartment.' },
    { id:'love',    icon:'🔥', name:'Make love',            desc:'Slow down for each other.' },
    { id:'walk',    icon:'🚶', name:'Take a walk together', desc:'No destination required.' },
    { id:'dinner',  icon:'🍽️', name:'Have dinner together', desc:'Same table, phones away.' },
    { id:'watch',   icon:'🎬', name:'Watch something together', desc:'A film, a show, a match — together.' },
    { id:'offline', icon:'🌿', name:'Screen-free time at home', desc:'An hour, just the two of you, no screens.' },
  ];

  const toastEl = document.getElementById('toast');
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(()=> toastEl.classList.remove('show'), 1800);
  }

  if(!configured){
    toast('⚠️ Add your Supabase URL + key in the code');
  }

  // ---- week id (ISO week, Monday start) ----
  function getWeekId(d = new Date()){
    const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    const day = (date.getUTCDay() + 6) % 7; // Mon=0..Sun=6
    date.setUTCDate(date.getUTCDate() - day + 3);
    const firstThursday = new Date(Date.UTC(date.getUTCFullYear(),0,4));
    const weekNo = 1 + Math.round(((date - firstThursday) / 86400000 - 3 + ((firstThursday.getUTCDay()+6)%7)) / 7);
    return `${date.getUTCFullYear()}-W${String(weekNo).padStart(2,'0')}`;
  }
  function nextMondayLabel(){
    const now = new Date();
    const day = now.getDay();
    const daysUntilMon = (8 - day) % 7 || 7;
    const next = new Date(now);
    next.setDate(now.getDate() + daysUntilMon);
    return next.toLocaleDateString(undefined, { weekday:'long', month:'short', day:'numeric' });
  }

  const weekId = getWeekId();
  let currentState = {};

  const listEl = document.getElementById('habitList');
  function renderHabits(){
    listEl.innerHTML = '';
    HABITS.forEach(h=>{
      const done = !!currentState[h.id];
      const row = document.createElement('div');
      row.className = 'habit' + (done ? ' done' : '');
      row.innerHTML = `
        <div class="check">
          <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#000000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="habit-icon">${h.icon}</div>
        <div class="habit-text">
          <div class="habit-name">${h.name}</div>
          <div class="habit-desc">${h.desc}</div>
        </div>`;
      row.addEventListener('click', ()=> toggleHabit(h.id));
      listEl.appendChild(row);
    });
    updateMoon();
  }

  async function toggleHabit(id){
    currentState[id] = !currentState[id];
    renderHabits();
    if(!configured) return;
    try{
      const { error } = await sb.from('weeks').upsert({ week_id: weekId, state: currentState });
      if(error) throw error;
    }catch(e){ console.error('save failed', e); toast("Couldn't save — check Supabase setup"); }
  }

  function updateMoon(){
    const doneCount = HABITS.filter(h=>currentState[h.id]).length;
    const pct = Math.round((doneCount / HABITS.length) * 100);
    document.getElementById('moonFill').style.height = pct + '%';
    const label = document.getElementById('moonLabel');
    if(doneCount === 0){
      label.innerHTML = `A new week, waiting to be filled`;
    } else if(doneCount === HABITS.length){
      label.innerHTML = `<span class="moon-count">Full moon</span> — every habit, done`;
    } else {
      label.innerHTML = `<span class="moon-count">${doneCount} of ${HABITS.length}</span> done this week`;
    }
  }

  async function computeStreak(){
    if(!configured) return;
    try{
      const { data, error } = await sb.from('weeks').select('week_id, state').order('week_id', { ascending:false });
      if(error) throw error;
      let streak = 0;
      for(const row of data){
        if(row.week_id === weekId) continue;
        const allDone = HABITS.every(h => row.state && row.state[h.id]);
        if(allDone) streak++; else break;
      }
      const streakLabel = document.getElementById('streakLabel');
      streakLabel.textContent = streak > 0 ? `${streak} perfect week${streak>1?'s':''} in a row 🔥` : '';
    }catch(e){ console.error(e); }
  }

  async function initWeek(){
    document.getElementById('resetNote').textContent = `Resets Monday, ${nextMondayLabel()}`;
    if(configured){
      try{
        const { data, error } = await sb.from('weeks').select('state').eq('week_id', weekId).maybeSingle();
        if(error) throw error;
        currentState = (data && data.state) || {};
      }catch(e){ console.error(e); currentState = {}; }
    }
    renderHabits();
    computeStreak();
  }

  // ---- photos ----
  const galleryWrap = document.getElementById('galleryWrap');
  const photoInput = document.getElementById('photoInput');
  let photos = [];
  const TILTS = [-3,-1.5,0,1.5,3,-2.5,2];

  function renderGallery(){
    if(photos.length === 0){
      galleryWrap.innerHTML = `<div class="empty-state">No photos yet. Add one from a date, a walk, or a quiet night in.</div>`;
      return;
    }
    const grid = document.createElement('div');
    grid.className = 'gallery';
    photos.forEach((p, i)=>{
      const fig = document.createElement('figure');
      fig.className = 'polaroid';
      fig.style.setProperty('--tilt', `${TILTS[i % TILTS.length]}deg`);
      fig.innerHTML = `
        <div class="del" data-id="${p.id}">✕</div>
        <img src="${p.data_url}" alt="${p.caption ? p.caption.replace(/"/g,'&quot;') : 'A shared memory'}">
        <figcaption>${p.caption || ''}</figcaption>`;
      grid.appendChild(fig);
    });
    galleryWrap.innerHTML = '';
    galleryWrap.appendChild(grid);
    galleryWrap.querySelectorAll('.del').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        deletePhoto(btn.dataset.id);
      });
    });
  }

  async function loadPhotos(){
    if(!configured){ renderGallery(); return; }
    try{
      const { data, error } = await sb.from('photos').select('*').order('created_at', { ascending:true });
      if(error) throw error;
      photos = data || [];
    }catch(e){ console.error(e); photos = []; }
    renderGallery();
  }

  function resizeImage(file){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = (e)=>{
        const img = new Image();
        img.onload = ()=>{
          const maxDim = 800;
          let { width, height } = img;
          if(width > height && width > maxDim){
            height = Math.round(height * (maxDim/width)); width = maxDim;
          } else if(height > maxDim){
            width = Math.round(width * (maxDim/height)); height = maxDim;
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.72));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  document.getElementById('addPhotoBtn').addEventListener('click', ()=> photoInput.click());
  photoInput.addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    if(!configured){ toast('⚠️ Add your Supabase keys first'); photoInput.value=''; return; }
    if(photos.length >= 60){
      toast('Gallery is full — delete an old one first');
      photoInput.value = '';
      return;
    }
    try{
      const dataUrl = await resizeImage(file);
      const caption = window.prompt('Caption (optional):', '') || '';
      const id = Date.now().toString(36)+Math.random().toString(36).slice(2,6);
      const { error } = await sb.from('photos').insert({ id, data_url: dataUrl, caption });
      if(error) throw error;
      photos.push({ id, data_url: dataUrl, caption });
      renderGallery();
      toast('Photo added 🖤');
    }catch(err){
      console.error(err);
      toast("Couldn't add that photo");
    }
    photoInput.value = '';
  });

  async function deletePhoto(id){
    if(!configured) return;
    try{
      const { error } = await sb.from('photos').delete().eq('id', id);
      if(error) throw error;
      photos = photos.filter(p => p.id !== id);
      renderGallery();
    }catch(e){ console.error(e); toast("Couldn't delete photo"); }
  }

  initWeek();
  loadPhotos();
})();
</script>
</body>
</html>
